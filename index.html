<body></body>
<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
  /* global nn */

  function draw () {
    //let x=nn.random(nn.width)
    //let y=nn.random(nn.height)
    if (nn.mouseDown) {
      let x = nn.mouseX
      let y = nn.mouseY
      let hue = nn.random(360)
      nn.create('div')
        .content('🥲')
        .css('user-select', 'none')
        .hueRotate(hue)
        .position(x, y)
        .scale(4)
        .rotate(hue)
        .addTo('body')


    }
    
  }

  //nn.times(500,draw)

  nn.on('mousemove', draw)
</script>
